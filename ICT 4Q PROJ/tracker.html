<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <style>
        body {
            background: linear-gradient(135deg, #c64e4e, #da6c6c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .nav-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-btn.red {
            background-color: #ff909b;
        }

        .nav-btn.blue {
            background-color: #9bc3ff;
        }

        .nav-btn.green {
            background-color: #278f5f;
        }

        .nav-btn:hover {
            opacity: 0.8;
        }

        .card {
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 80px; /* prevents overlap */
        }

        .title {
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .chart-container {
            text-align: center;
            margin-top: 20px;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-custom {
            background-color: #a72727;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background-color: #bb3333;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-title">4th Quarter Project</div>
    <div class="nav-buttons">
        <a href="index.html" class="nav-btn red">Classmates</a>
        <a href="tracker.html" class="nav-btn blue">Attendance Tracker</a>
        <a href="gallery.html" class="nav-btn green">Gallery</a>
    </div>
</nav>

<div class="card col-md-5">
    <h3 class="title"><i class="fa-solid fa-chart-line"></i> Attendance Tracker</h3>

    <div class="mb-3">
        <label class="form-label">Select Day</label>
        <select id="day" class="form-select">
            <option value="monday">Monday</option>
            <option value="tuesday">Tuesday</option>
            <option value="wednesday">Wednesday</option>
            <option value="thursday">Thursday</option>
            <option value="friday">Friday</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Number of Absences</label>
        <input type="number" id="num" class="form-control" value="0">
    </div>

    <div class="d-grid">
        <button class="btn btn-custom" onclick="plot()">
            <i class="fa-solid fa-chart-simple"></i> Update Chart
        </button>
    </div>

    <div class="chart-container">
        <img src="plot.png" id="chart">
    </div>
</div>

<py-script src="tracker.py"></py-script>

</body>
</html>
